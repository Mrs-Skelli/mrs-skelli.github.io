{{ define "main" }}
<div class="mainbg">
    <div class="terminal-window">
        {{ partial "terminal-header.html" (dict "title" (printf "%s ~ warp" .Title)) }}
        <div class="terminal-content">
            <p class="terminal-prompt">skelli@macbook ~ % cd posts</p>
            <p class="terminal-prompt">skelli@macbook ~/posts % ls -la</p>

            <div class="content-container mb-4">
                {{ .Content }}
            </div>

            <p class="terminal-prompt">skelli@macbook ~/posts % ./select-blog.sh</p>
            <div class="contentbtn">
                <a href="{{ "/posts/blog/" | relURL }}" class="btn btn-outline-light" role="button">Blog Posts</a>
                <a href="{{ "/posts/hadrian/" | relURL }}" class="btn btn-outline-light" role="button">Hadrian Blogs</a>
            </div>

            <div class="mt-4">
                <a href="{{ "/" | relURL }}" class="btn btn-outline-light">← Home</a>
            </div>
        </div>
    </div>
</div>
{{ end }}
