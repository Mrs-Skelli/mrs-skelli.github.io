{{ define "main" }}
<div class="mainbg">
    <div class="terminal-window">
        {{ partial "terminal-header.html" (dict "title" (printf "%s ~ warp" .Title)) }}
        <div class="terminal-content">
            <p class="terminal-prompt">skelli@macbook ~ % cd about/personal</p>
            <p class="terminal-prompt">skelli@macbook ~/about/personal % cat README.md</p>

            <div class="content-title">
                <h1>{{ .Title }}</h1>
            </div>

            <div class="content">
                {{ .Content }}
            </div>

            <p class="terminal-prompt">skelli@macbook ~/about/personal % cd ..</p>

            <div class="mt-4 contentbtn">
                <a href="{{ "/about/" | relURL }}" class="btn btn-outline-light">← About</a>
                <a href="{{ "/" | relURL }}" class="btn btn-outline-light">Home</a>
            </div>
        </div>
    </div>
</div>
{{ end }}
