{{ define "main" }}
<div class="mainbg">
    <div class="terminal-window">
        {{ partial "terminal-header.html" (dict "title" (printf "%s ~ warp" .Title)) }}
        <div class="terminal-content">
            <p class="terminal-prompt">skelli@macbook ~ % cd about</p>
            <p class="terminal-prompt">skelli@macbook ~/about % ls -la</p>

            <div class="content-container mb-4">
                {{ .Content }}
            </div>

            <p class="terminal-prompt">skelli@macbook ~/about % ./select-profile.sh</p>
            <div class="contentbtn">
                <a href="{{ "/about/professional/" | relURL }}" class="btn btn-outline-light">Professional</a>
                <a href="{{ "/about/personal/" | relURL }}" class="btn btn-outline-light">Personal</a>
            </div>

            <div class="mt-4">
                <a href="{{ "/" | relURL }}" class="btn btn-outline-light">← Home</a>
            </div>
        </div>
    </div>
</div>
{{ end }}
