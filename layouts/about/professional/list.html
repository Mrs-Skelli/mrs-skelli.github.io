{{ define "main" }}
<div class="mainbg">
    <div class="terminal-window">
        {{ partial "terminal-header.html" (dict "title" (printf "%s ~ warp" .Title)) }}
        <div class="terminal-content">
            <p class="terminal-prompt">skelli@macbook ~ % cd about/professional</p>
            <p class="terminal-prompt">skelli@macbook ~/about/professional % cat profile.md</p>

            <div class="content-title">
                <h1>{{ .Title }}</h1>
            </div>

            <div class="content">
                {{ .Content }}
            </div>

            <p class="terminal-prompt">skelli@macbook ~/about/professional % cd ..</p>

            <div class="mt-4 contentbtn">
                <a href="https://www.divd.nl/who-we-are/team/people/eden-stroet/" class="btn btn-outline-light" target="_blank" rel="noopener noreferrer">DIVD</a>
                <a href="{{ "/about/" | relURL }}" class="btn btn-outline-light">← About</a>
                <a href="{{ "/" | relURL }}" class="btn btn-outline-light">Home</a>
            </div>
        </div>
    </div>
</div>
{{ end }}
